<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrar — Meu Trevo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-light: #ffffff;
            --theme-color: #9333ea;
            --success-color: #10b981;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(rgba(255, 255, 255, 0.04) 3px, transparent 3px),
                radial-gradient(rgba(255, 255, 255, 0.02) 4px, transparent 4px);
            background-size: 40px 40px, 90px 90px;
            background-position: 0 0, 20px 20px;
            color: #f8fafc;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .caixa { width: 100%; max-width: 400px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 30px 25px; box-shadow: var(--shadow); }
        .logo { text-align: center; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
        .logo span { color: #fbbf24; }
        .sub { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px; }
        label { display: block; font-size: 0.72rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #f8fafc; padding: 13px; border-radius: 8px; font-size: 1rem; outline: none; margin-bottom: 16px; }
        input:focus { border-color: var(--theme-color); }

        /* Campo de senha com o olhinho de mostrar/ocultar */
        .campo-senha { position: relative; }
        .campo-senha input { padding-right: 48px; }
        .olho { position: absolute; right: 6px; top: 6px; background: transparent; border: none; font-size: 1.1rem; cursor: pointer; padding: 6px 8px; line-height: 1; opacity: 0.75; }
        .olho:hover { opacity: 1; }
        .btn { width: 100%; background: var(--success-color); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 800; font-size: 1.05rem; cursor: pointer; box-shadow: 0 4px 10px rgba(16,185,129,0.3); }
        .btn:active { transform: scale(0.99); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .link { display: block; text-align: center; margin-top: 16px; color: #94a3b8; font-size: 0.82rem; text-decoration: none; cursor: pointer; }
        .link:hover { color: #e2e8f0; }
        .aviso { margin-top: 20px; padding: 12px; border-radius: 8px; font-size: 0.75rem; line-height: 1.5; background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); color: #fcd34d; }
        .msg { padding: 12px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 16px; display: none; line-height: 1.4; }
        .msg-erro { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35); color: #fca5a5; }
        .msg-ok { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.35); color: #6ee7b7; }
    </style>
</head>
<body>
    <div class="caixa">
        <div class="logo">Meu <span>Trevo</span> 🍀</div>
        <div class="sub" id="subtitulo">Entre para acessar suas análises</div>

        <div class="msg msg-erro" id="msg-erro"></div>
        <div class="msg msg-ok" id="msg-ok"></div>

        <form id="form-login">
            <div id="campo-email">
                <label for="email">E-mail</label>
                <input type="email" id="email" autocomplete="email" placeholder="seu@email.com" required>
            </div>

            <label for="senha">Senha</label>
            <div class="campo-senha">
                <input type="password" id="senha" autocomplete="current-password" placeholder="Sua senha" required>
                <button type="button" class="olho" id="btn-olho" aria-label="Mostrar senha">👁️</button>
            </div>

            <button type="submit" class="btn" id="btn-entrar">ENTRAR</button>
        </form>

        <a class="link" id="link-recuperar">Esqueci minha senha</a>
        <a class="link" id="link-modo"><b>Não tem conta? Criar agora</b></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="b12.js"></script>
    <script src="auth.js"></script>
    <script>
        const elErro = document.getElementById('msg-erro');
        const elOk = document.getElementById('msg-ok');
        const btn = document.getElementById('btn-entrar');
        let modo = 'entrar'; // 'entrar' | 'cadastrar' | 'nova-senha'

        function mostrarErro(txt) { elOk.style.display = 'none'; elErro.innerText = txt; elErro.style.display = 'block'; }
        function mostrarOk(txt) { elErro.style.display = 'none'; elOk.innerText = txt; elOk.style.display = 'block'; }

        // Olhinho: mostrar/ocultar a senha
        document.getElementById('btn-olho').addEventListener('click', () => {
            const campo = document.getElementById('senha');
            const olho = document.getElementById('btn-olho');
            const vendo = campo.type === 'text';
            campo.type = vendo ? 'password' : 'text';
            olho.innerText = vendo ? '👁️' : '🙈';
            olho.setAttribute('aria-label', vendo ? 'Mostrar senha' : 'Ocultar senha');
            campo.focus();
        });

        // Entra no modo "definir nova senha" (quem chegou pelo link do e-mail)
        function entrarModoNovaSenha() {
            modo = 'nova-senha';
            document.getElementById('subtitulo').innerText = 'Defina sua nova senha';
            document.getElementById('campo-email').style.display = 'none';
            const s = document.getElementById('senha');
            s.value = '';
            s.setAttribute('autocomplete', 'new-password');
            s.placeholder = 'Nova senha (mín. 6 caracteres)';
            btn.innerText = 'SALVAR NOVA SENHA';
            document.getElementById('link-recuperar').style.display = 'none';
            document.getElementById('link-modo').style.display = 'none';
            mostrarOk('Quase lá! Digite a senha nova que você quer usar.');
        }

        // O Supabase avisa quando a pessoa chega pelo link de recuperação.
        sb.auth.onAuthStateChange((evento) => {
            if (evento === 'PASSWORD_RECOVERY') entrarModoNovaSenha();
        });

        // Se já estiver logado, não fica preso na tela de login.
        // Exceção: quem veio do link de recuperação TEM sessão, mas precisa
        // trocar a senha antes — por isso checamos o endereço primeiro.
        (async () => {
            const veioDeRecuperacao = location.hash.includes('type=recovery');
            if (veioDeRecuperacao) { entrarModoNovaSenha(); return; }
            const sessao = await pegarSessao();
            if (sessao) location.replace('index.html');
        })();

        document.getElementById('link-modo').addEventListener('click', () => {
            elErro.style.display = 'none'; elOk.style.display = 'none';
            if (modo === 'entrar') {
                modo = 'cadastrar';
                document.getElementById('subtitulo').innerText = 'Crie sua conta para começar';
                document.getElementById('senha').setAttribute('autocomplete', 'new-password');
                document.getElementById('senha').placeholder = 'Crie uma senha (mín. 6 caracteres)';
                btn.innerText = 'CRIAR CONTA';
                document.getElementById('link-modo').innerHTML = '<b>Já tenho conta — entrar</b>';
                document.getElementById('link-recuperar').style.display = 'none';
            } else {
                modo = 'entrar';
                document.getElementById('subtitulo').innerText = 'Entre para acessar suas análises';
                document.getElementById('senha').setAttribute('autocomplete', 'current-password');
                document.getElementById('senha').placeholder = 'Sua senha';
                btn.innerText = 'ENTRAR';
                document.getElementById('link-modo').innerHTML = '<b>Não tem conta? Criar agora</b>';
                document.getElementById('link-recuperar').style.display = 'block';
            }
        });

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            elErro.style.display = 'none'; elOk.style.display = 'none';
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            btn.disabled = true;
            btn.innerText = (modo === 'entrar') ? 'ENTRANDO…' : (modo === 'nova-senha' ? 'SALVANDO…' : 'CRIANDO…');

            // Quem chegou pelo link do e-mail: só troca a senha e entra.
            if (modo === 'nova-senha') {
                if (senha.length < 6) {
                    mostrarErro('A senha precisa ter pelo menos 6 caracteres.');
                    btn.disabled = false; btn.innerText = 'SALVAR NOVA SENHA';
                    return;
                }
                const { error } = await sb.auth.updateUser({ password: senha });
                if (error) {
                    mostrarErro(traduzErroAuth(error));
                    btn.disabled = false; btn.innerText = 'SALVAR NOVA SENHA';
                    return;
                }
                mostrarOk('Senha alterada! Entrando…');
                setTimeout(() => location.replace('index.html'), 1200);
                return;
            }

            if (modo === 'cadastrar') {
                // ⚠️ CRÍTICO: o campo 'produto' É OBRIGATÓRIO.
                // O gatilho do Supabase (handle_new_user) provisiona escritório do
                // DrControl em todo cadastro que NÃO vier marcado. Sem esta linha,
                // cada cadastro do Loto criaria um escritório fantasma no DrControl.
                const { error } = await sb.auth.signUp({
                    email,
                    password: senha,
                    options: {
                        data: { produto: PRODUTO }, // PRODUTO = 'lotologica' (vem do b12.js)
                        // OBRIGATÓRIO: o "Site URL" do projeto Supabase aponta para o
                        // DrControl (é o mesmo projeto). Sem esta linha, o link do
                        // e-mail de confirmação levaria o cliente do Meu Trevo para
                        // o drcontrol.com.br.
                        emailRedirectTo: location.origin + '/login.html'
                    }
                });
                if (error) {
                    mostrarErro(traduzErroAuth(error));
                    btn.disabled = false; btn.innerText = 'CRIAR CONTA';
                    return;
                }
                const sessao = await pegarSessao();
                if (sessao) { location.replace('index.html'); return; }
                // Projeto pede confirmação de e-mail
                mostrarOk('Conta criada! Enviamos um e-mail de confirmação para ' + email + '. Confirme e depois entre.');
                btn.disabled = false; btn.innerText = 'CRIAR CONTA';
                return;
            }

            const { error } = await sb.auth.signInWithPassword({ email, password: senha });
            if (error) {
                mostrarErro(traduzErroAuth(error));
                btn.disabled = false; btn.innerText = 'ENTRAR';
                return;
            }
            location.replace('index.html');
        });

        document.getElementById('link-recuperar').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            if (!email) { mostrarErro('Digite seu e-mail no campo acima e clique de novo em "Esqueci minha senha".'); return; }

            const { error } = await sb.auth.resetPasswordForEmail(email, {
                redirectTo: location.origin + '/login.html'
            });
            if (error) { mostrarErro(traduzErroAuth(error)); return; }
            mostrarOk('Enviamos um link de recuperação para ' + email + '. Confira sua caixa de entrada.');
        });
    </script>
</body>
</html>
